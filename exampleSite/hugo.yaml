# Configuration
baseURL: "https://revelation-today.net/"
title: "The Book of Revelation"

enableRobotsTXT: true
enableGitInfo: true
# enableEmoji: false
hasCJKLanguage: true

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

taxonomies:
  theme: themes

defaultContentLanguage: en
languages:
  de:
    languageName: Deutsch
    weight: 10
    title: Das Buch Offenbarung
  en:
    languageName: English
    weight: 20
    title: The Book of Revelation
  id:
    languageName: Bahasa Indonesia
    weight: 30
    title: Kitab Wahyu
  tr:
    languageName: Türkçe
    weight: 40
    title: Vihay

module:
  hugoVersion:
    extended: true
    min: "0.112.0"

  workspace: hugo.work
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    - identifier: tour
      name: Tour
      params:
        icon: map
      pageRef: /welcome
      weight: 1
    - identifier: guide
      name: Chapter by chapter
      params:
        icon: table
      pageRef: /guide
      weight: 2
    - identifier: story
      name: Poetic story
      params:
        icon: book-open
      pageRef: /story
      weight: 3
    - identifier: quick
      name: Quick
      params:
        icon: lightning-bolt
      pageRef: /quick
      weight: 4
    - identifier: application
      name: Application
      params:
        icon: pencil
      pageRef: /appl
      weight: 5
    - identifier: explanation
      name: Deep dive
      params:
        icon: light-bulb
      pageRef: /expl
      weight: 6
    - identifier: kids
      name: Kids
      params:
        icon: academic-cap
      pageRef: /kids
      weight: 7
    - identifier: sermons
      name: Sermons
      params:
        icon: speakerphone
      pageRef: /sermons
      weight: 8
    - identifier: contact
      name: Contact
      params:
        icon: chat
      pageRef: /contact
      weight: 9
    - identifier: help
      name: Help
      pageRef: /help
      params:
        type: help
      weight: 10
    - name: Search
      weight: 11
      params:
        type: search

  sidebar:
    - identifier: about
      name: "About"
      pageRef: "/about"
      weight: 4

params:
  description: Modern, responsive, batteries-included Hugo theme for creating beautiful static websites.

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      # width: 40
      # height: 20
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: true
    width: normal

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: true
    base: "https://github.com/revelation-today/revelation-today/blob/main/exampleSite/content"

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: revelation-today
      repoId: R_kgDOJ9fJag
      category: General
      categoryId: DIC_kwDOJ9fJas4CY7gW
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      # lang: en
